<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Volume Tier Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Volume Tier Quiz</h1>
  <p>Drag each volume level into <strong>Sane</strong> or <strong>Nope</strong>.</p>

  <div id="numbers"></div>

  <div class="tiers">
    <div class="tier" data-tier="Sane">
      <h2>Sane</h2>
    </div>
    <div class="tier" data-tier="Nope">
      <h2>Nope</h2>
    </div>
  </div>

  <button id="scoreBtn">Score</button>
  <button id="resetBtn">New Random Set</button>

  <div id="result"></div>

  <script src="script.js"></script>
</body>
</html>
