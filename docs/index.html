<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Volume Slider Sanity Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <h1 id="title">Volume Slider Sanity Quiz</h1>
    <p><i id="subtitle">What volume levels are sane, and which are objectively unacceptable on any volume slider.</i></p>


    <div id="remaining"></div>

    <div id="bigNumber">—</div>

    <div id="buttons">
      <button id="saneBtn" class="sane">SANE</button>
      <button id="nopeBtn" class="nope">NOPE</button>
    </div>
    <div id="hint">Keyboard: ← / →</div>
    <div id="history">
      <h3>Answered</h3>
      <div id="historyList" class="history-box"></div>
    </div>
    <div id="result"></div>

    <button id="restartBtn" hidden>New Test</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
